<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Hero Code Viewer</title>

<style>
/* =========================
   ROOT
========================= */
:root{
  --bg:#191919;
  --card:#1F1F1F;
  --hover:#323232;
  --outline:#323232;
  --accent:#87A9FF;
  --text:#D4D4D4;
  --sub:#8C8C8C;
}

/* =========================
   HARD RESET
========================= */
html,
body{
  margin:0 !important;
  padding:0 !important;
  width:100% !important;
  max-width:100% !important;

  overflow-x:hidden !important;

  background:transparent;

  font-family:Arial, Helvetica, sans-serif;
}

#hero-code-viewer,
#hero-code-viewer *{
  box-sizing:border-box;
}

/* =========================
   MAIN TOOL
========================= */
#hero-code-viewer{

  /* THIS FIXES FOURTHWALL CUTTING */
  width:100%;
  max-width:100%;

  display:flex;
  flex-direction:column;

  background:var(--bg);

  border:1px solid var(--outline);
  border-radius:20px;

  color:var(--text);

  overflow:hidden;

  /* CRITICAL */
  min-height:auto !important;
  height:auto !important;

  position:relative;
}

/* =========================
   TOOLBAR
========================= */
.hero-toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;

  padding:18px;

  border-bottom:1px solid var(--outline);

  flex-wrap:wrap;
}

.hero-title{
  font-size:20px;
  font-weight:700;
}

.hero-sub{
  font-size:12px;
  color:var(--sub);
  margin-top:4px;
}

.hero-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* =========================
   BUTTON
========================= */
.hero-btn{
  position:relative;

  padding:10px 16px;

  border-radius:10px;

  border:1px solid rgba(255,255,255,0.06);

  background:var(--card);
  color:var(--text);

  cursor:pointer;

  overflow:hidden;

  transition:
    background .2s ease,
    transform .15s ease;
}

.hero-btn:hover{
  background:var(--hover);
}

.hero-btn:active{
  transform:scale(.98);
}

.hero-btn::before{
  content:'';

  position:absolute;
  top:0;
  left:-100%;

  width:75%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.12),
      transparent
    );

  transform:skewX(-25deg);

  transition:left .7s ease;
}

.hero-btn:hover::before{
  left:125%;
}

.hero-btn.primary{
  color:var(--accent);
}

/* =========================
   MAIN LAYOUT
========================= */
.hero-layout{

  /* IMPORTANT */
  width:100%;
  max-width:100%;

  display:grid;

  grid-template-columns:
    minmax(0,1fr)
    minmax(0,1fr);

  overflow:hidden;
}

/* =========================
   PANELS
========================= */
.hero-panel{
  display:flex;
  flex-direction:column;

  min-width:0;
}

.hero-divider{
  width:1px;
  background:var(--outline);
}

.hero-panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:10px;

  padding:14px 16px;

  border-bottom:1px solid var(--outline);

  background:rgba(255,255,255,.015);
}

.hero-panel-title{
  font-size:14px;
  font-weight:700;
}

.hero-panel-note{
  font-size:11px;
  color:var(--sub);
}

/* =========================
   EDITOR
========================= */
.hero-editor-wrap{

  /* THIS FIXES COLLAPSING */
  height:700px;

  background:#151515;

  overflow:auto;
}

.hero-editor{

  width:100%;
  height:100%;

  min-height:700px;

  border:none;
  outline:none;

  resize:vertical;

  padding:20px;

  background:#151515;
  color:#ECECEC;

  font-size:14px;
  line-height:1.7;

  font-family:
    ui-monospace,
    SFMono-Regular,
    Menlo,
    Monaco,
    Consolas,
    monospace;

  white-space:pre;

  overflow:auto;

  display:block !important;

  appearance:none;
  -webkit-appearance:none;
}

/* =========================
   PREVIEW
========================= */
.hero-preview-wrap{

  /* THIS FIXES CROPPING */
  height:700px;

  background:#fff;
}

.hero-preview{
  width:100%;
  height:100%;

  border:none;

  background:#fff;

  display:block;
}

/* =========================
   STATUS BAR
========================= */
.hero-status{
  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:12px;

  padding:12px 16px;

  border-top:1px solid var(--outline);

  color:var(--sub);

  font-size:12px;

  flex-wrap:wrap;
}

.hero-status-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.hero-dot{
  width:8px;
  height:8px;

  border-radius:50%;

  background:#3ddc84;
}

/* =========================
   MOBILE
========================= */
@media (max-width: 900px){

  .hero-layout{
    grid-template-columns:1fr;
  }

  .hero-divider{
    width:100%;
    height:1px;
  }

  .hero-editor-wrap,
  .hero-preview-wrap{
    height:500px;
  }

  .hero-editor{
    min-height:500px;
  }

  .hero-actions{
    width:100%;
  }

  .hero-btn{
    flex:1;
  }
}

/* =========================
   FOURTHWALL FIXES
========================= */

/* Prevent hidden textarea */
textarea{
  opacity:1 !important;
  visibility:visible !important;

  pointer-events:auto !important;
}

/* Prevent parent clipping */
#hero-code-viewer,
.hero-layout,
.hero-panel,
.hero-editor-wrap,
.hero-preview-wrap{
  overflow:visible;
}

/* But keep iframe clean */
.hero-preview-wrap{
  overflow:hidden;
}

/* Prevent weird scaling */
iframe{
  max-width:100%;
}

/* Prevent inherited transforms */
#hero-code-viewer *{
  transform-style:flat;
}
</style>
</head>
<body>

<div id="hero-code-viewer">

  <!-- HEADER -->
  <div class="hero-toolbar">

    <div>
      <div class="hero-title">
        Live HTML/CSS/JS Viewer
      </div>

      <div class="hero-sub">
        Real-time live code preview
      </div>
    </div>

    <div class="hero-actions">

      <button
        class="hero-btn primary"
        id="runBtn"
      >
        Run
      </button>

      <button
        class="hero-btn"
        id="copyBtn"
      >
        Copy
      </button>

      <button
        class="hero-btn"
        id="clearBtn"
      >
        Clear
      </button>

      <button
        class="hero-btn"
        id="resetBtn"
      >
        Reset
      </button>

    </div>

  </div>

  <!-- MAIN -->
  <div class="hero-layout">

    <!-- LEFT -->
    <div class="hero-panel">

      <div class="hero-panel-header">

        <div class="hero-panel-title">
          Code Editor
        </div>

        <div class="hero-panel-note">
          HTML + CSS + JS
        </div>

      </div>

      <div class="hero-editor-wrap">

<textarea
id="editor"
class="hero-editor"
><!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
}

.card{
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  text-align:center;
}

button{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#87A9FF;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>Hello Hero 👋</h1>
  <p>Your code updates live.</p>

  <button onclick="hello()">
    Click Me
  </button>
</div>

<script>
function hello(){
  alert("JavaScript works!");
}
</script>

</body>
</html></textarea>

      </div>

    </div>

    <!-- DIVIDER -->
    <div class="hero-divider"></div>

    <!-- RIGHT -->
    <div class="hero-panel">

      <div class="hero-panel-header">

        <div class="hero-panel-title">
          Live Preview
        </div>

        <div class="hero-panel-note">
          Sandboxed iframe
        </div>

      </div>

      <div class="hero-preview-wrap">

<iframe
  id="preview"
  class="hero-preview"
  sandbox="allow-scripts allow-modals"
></iframe>

      </div>

    </div>

  </div>

  <!-- STATUS -->
  <div class="hero-status">

    <div class="hero-status-left">

      <div class="hero-dot"></div>

      <span>
        Live Preview Enabled
      </span>

    </div>

    <div id="statusText">
      Ready
    </div>

  </div>

</div>

<script>
/* =========================
   ELEMENTS
========================= */
const editor =
  document.getElementById("editor");

const preview =
  document.getElementById("preview");

const runBtn =
  document.getElementById("runBtn");

const copyBtn =
  document.getElementById("copyBtn");

const clearBtn =
  document.getElementById("clearBtn");

const resetBtn =
  document.getElementById("resetBtn");

const statusText =
  document.getElementById("statusText");

/* =========================
   DEFAULT TEMPLATE
========================= */
const defaultTemplate =
  editor.value;

/* =========================
   UPDATE PREVIEW
========================= */
let debounce;

function updatePreview(){

  clearTimeout(debounce);

  debounce = setTimeout(() => {

    try{

      preview.srcdoc =
        editor.value;

      statusText.textContent =
        "Preview updated";

    }catch(err){

      console.error(err);

      statusText.textContent =
        "Preview error";
    }

  }, 100);
}

/* =========================
   BUTTONS
========================= */
runBtn.addEventListener(
  "click",
  updatePreview
);

clearBtn.addEventListener(
  "click",
  () => {

    editor.value = "";

    updatePreview();

    statusText.textContent =
      "Editor cleared";
  }
);

resetBtn.addEventListener(
  "click",
  () => {

    editor.value =
      defaultTemplate;

    updatePreview();

    statusText.textContent =
      "Template restored";
  }
);

copyBtn.addEventListener(
  "click",
  async () => {

    try{

      await navigator.clipboard.writeText(
        editor.value
      );

      statusText.textContent =
        "Copied";

    }catch(err){

      statusText.textContent =
        "Clipboard blocked";
    }
  }
);

/* =========================
   TAB SUPPORT
========================= */
editor.addEventListener(
  "keydown",
  (e) => {

    if(e.key === "Tab"){

      e.preventDefault();

      const start =
        editor.selectionStart;

      const end =
        editor.selectionEnd;

      editor.value =
        editor.value.substring(0, start)
        + "  "
        + editor.value.substring(end);

      editor.selectionStart =
      editor.selectionEnd =
        start + 2;
    }
  }
);

/* =========================
   LIVE UPDATE
========================= */
editor.addEventListener(
  "input",
  updatePreview
);

/* =========================
   INITIAL
========================= */
updatePreview();

/* =========================
   FORCE HEIGHT FIX
   FOR FOURTHWALL
========================= */
function forceHeight(){

  const tool =
    document.getElementById(
      "hero-code-viewer"
    );

  tool.style.height = "auto";

  const totalHeight =
    tool.scrollHeight;

  tool.style.minHeight =
    totalHeight + "px";
}

setTimeout(forceHeight, 100);
setTimeout(forceHeight, 500);
setTimeout(forceHeight, 1000);

window.addEventListener(
  "resize",
  forceHeight
);
</script>

</body>
</html>
