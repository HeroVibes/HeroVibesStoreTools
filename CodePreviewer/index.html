<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Hero Code Viewer</title>

<style>
/* =========================
   ROOT
========================= */
:root{
  --bg:#191919;
  --card:#1F1F1F;
  --hover:#323232;
  --outline:#323232;
  --accent:#87A9FF;
  --text:#D4D4D4;
  --sub:#8C8C8C;

  --radius:16px;
}

/* =========================
   RESET
========================= */
#hero-code-viewer,
#hero-code-viewer *{
  box-sizing:border-box;
}

html,
body{
  margin:0 !important;
  padding:0 !important;
  width:100%;
  min-width:0;
  background:transparent;
  overflow-x:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   MAIN WRAPPER
========================= */
#hero-code-viewer{
  width:100%;
  max-width:100%;
  overflow:hidden;

  background:var(--bg);
  border:1px solid var(--outline);
  border-radius:20px;

  color:var(--text);

  position:relative;
  isolation:isolate;

  /* Critical Fourthwall fixes */
  display:flex;
  flex-direction:column;

  min-height:900px;

  transform:none !important;
  contain:none !important;
}

/* =========================
   HEADER
========================= */
.hero-toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;

  padding:18px 18px;

  border-bottom:1px solid var(--outline);

  flex-wrap:wrap;
}

.hero-title-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.hero-title{
  font-size:20px;
  font-weight:700;
}

.hero-sub{
  font-size:12px;
  color:var(--sub);
}

/* =========================
   BUTTONS
========================= */
.hero-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.hero-btn{
  position:relative;

  padding:10px 16px;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.06);

  background:var(--card);
  color:var(--text);

  cursor:pointer;

  overflow:hidden;

  transition:
    background .2s ease,
    transform .15s ease;
}

.hero-btn:hover{
  background:var(--hover);
}

.hero-btn:active{
  transform:scale(.98);
}

.hero-btn::before{
  content:'';

  position:absolute;
  top:0;
  left:-100%;

  width:75%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.12),
      transparent
    );

  transform:skewX(-25deg);

  transition:left .7s ease;
}

.hero-btn:hover::before{
  left:125%;
}

.hero-btn.primary{
  color:var(--accent);
}

/* =========================
   LAYOUT
========================= */
.hero-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1fr);

  width:100%;
  flex:1;

  min-height:0;
}

/* =========================
   PANELS
========================= */
.hero-panel{
  display:flex;
  flex-direction:column;

  min-width:0;
  overflow:hidden;
}

.hero-divider{
  width:1px;
  background:var(--outline);
}

.hero-panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  gap:10px;

  padding:14px 16px;

  border-bottom:1px solid var(--outline);

  background:rgba(255,255,255,0.015);
}

.hero-panel-title{
  font-size:14px;
  font-weight:700;
}

.hero-panel-note{
  font-size:11px;
  color:var(--sub);
}

/* =========================
   EDITOR
========================= */
.hero-editor-wrap{
  flex:1;

  min-height:700px;

  background:#151515;

  overflow:hidden;
}

.hero-editor{
  width:100%;
  height:100%;
  min-height:700px;

  padding:20px;

  border:none;
  outline:none;
  resize:vertical;

  background:#151515;
  color:#EAEAEA;

  font-size:14px;
  line-height:1.7;

  font-family:
    ui-monospace,
    SFMono-Regular,
    Menlo,
    Monaco,
    Consolas,
    monospace;

  /* CRITICAL FIXES */
  display:block !important;
  visibility:visible !important;
  opacity:1 !important;

  appearance:none;
  -webkit-appearance:none;

  overflow:auto;

  z-index:2;
  position:relative;
}

/* =========================
   PREVIEW
========================= */
.hero-preview-wrap{
  flex:1;

  min-height:700px;

  background:#fff;
}

.hero-preview{
  width:100%;
  height:100%;
  min-height:700px;

  border:none;
  background:#fff;

  display:block;
}

/* =========================
   STATUS BAR
========================= */
.hero-status{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;

  padding:12px 16px;

  border-top:1px solid var(--outline);

  color:var(--sub);
  font-size:12px;

  flex-wrap:wrap;
}

.hero-status-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.hero-dot{
  width:8px;
  height:8px;
  border-radius:50%;

  background:#3ddc84;
  box-shadow:0 0 10px rgba(61,220,132,.45);
}

/* =========================
   MOBILE
========================= */
@media (max-width: 900px){

  #hero-code-viewer{
    min-height:auto;
  }

  .hero-layout{
    grid-template-columns:1fr;
  }

  .hero-divider{
    width:100%;
    height:1px;
  }

  .hero-editor-wrap,
  .hero-preview-wrap,
  .hero-editor,
  .hero-preview{
    min-height:480px;
  }

  .hero-actions{
    width:100%;
  }

  .hero-btn{
    flex:1;
    min-width:120px;
  }
}

/* =========================
   FOURTHWALL SAFETY FIXES
========================= */

/* Prevent host styles */
textarea{
  all:unset;

  width:100%;
  height:100%;

  padding:20px;

  background:#151515;
  color:#EAEAEA;

  font-size:14px;
  line-height:1.7;

  font-family:
    ui-monospace,
    SFMono-Regular,
    Menlo,
    Monaco,
    Consolas,
    monospace;

  overflow:auto;

  display:block !important;

  border:none;
  outline:none;

  white-space:pre;

  box-sizing:border-box;
}

/* Prevent collapsed iframe children */
iframe{
  display:block;
  max-width:100%;
}

/* Prevent invisible editor issue */
.hero-editor,
textarea{
  pointer-events:auto !important;
  user-select:text !important;
}

/* Prevent Fourthwall transforms */
#hero-code-viewer *{
  transform-style:flat;
}
</style>
</head>
<body>

<div id="hero-code-viewer">

  <!-- HEADER -->
  <div class="hero-toolbar">

    <div class="hero-title-wrap">
      <div class="hero-title">
        Live HTML/CSS/JS Viewer
      </div>

      <div class="hero-sub">
        Write code on the left, preview instantly on the right.
      </div>
    </div>

    <div class="hero-actions">

      <button class="hero-btn primary" id="runBtn">
        Run Code
      </button>

      <button class="hero-btn" id="copyBtn">
        Copy
      </button>

      <button class="hero-btn" id="clearBtn">
        Clear
      </button>

      <button class="hero-btn" id="resetBtn">
        Reset
      </button>

    </div>

  </div>

  <!-- LAYOUT -->
  <div class="hero-layout">

    <!-- LEFT -->
    <div class="hero-panel">

      <div class="hero-panel-header">
        <div class="hero-panel-title">Editor</div>
        <div class="hero-panel-note">HTML + CSS + JS</div>
      </div>

      <div class="hero-editor-wrap">

<textarea
  id="editor"
  class="hero-editor"
><!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
}

.card{
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  text-align:center;
}

button{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#87A9FF;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>Hello Hero 👋</h1>
  <p>Your code updates live.</p>

  <button onclick="hello()">
    Click Me
  </button>
</div>

<script>
function hello(){
  alert("JavaScript works!");
}
</script>

</body>
</html></textarea>

      </div>

    </div>

    <!-- DIVIDER -->
    <div class="hero-divider"></div>

    <!-- RIGHT -->
    <div class="hero-panel">

      <div class="hero-panel-header">
        <div class="hero-panel-title">Preview</div>
        <div class="hero-panel-note">Sandboxed Output</div>
      </div>

      <div class="hero-preview-wrap">

<iframe
  id="preview"
  class="hero-preview"
  sandbox="allow-scripts allow-modals"
></iframe>

      </div>

    </div>

  </div>

  <!-- STATUS -->
  <div class="hero-status">

    <div class="hero-status-left">
      <div class="hero-dot"></div>
      <span>Live Preview Enabled</span>
    </div>

    <div id="statusText">
      Ready
    </div>

  </div>

</div>

<script>
/* =========================
   ELEMENTS
========================= */
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

const runBtn = document.getElementById("runBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const resetBtn = document.getElementById("resetBtn");

const statusText = document.getElementById("statusText");

/* =========================
   DEFAULT TEMPLATE
========================= */
const defaultTemplate = editor.value;

/* =========================
   UPDATE PREVIEW
========================= */
let debounce;

function updatePreview(){

  clearTimeout(debounce);

  debounce = setTimeout(() => {

    try{

      preview.srcdoc = editor.value;

      statusText.textContent =
        "Preview updated";

    }catch(error){

      console.error(error);

      statusText.textContent =
        "Preview error";
    }

  }, 100);
}

/* =========================
   BUTTONS
========================= */
runBtn.addEventListener("click", updatePreview);

clearBtn.addEventListener("click", () => {

  editor.value = "";

  updatePreview();

  statusText.textContent =
    "Editor cleared";
});

resetBtn.addEventListener("click", () => {

  editor.value = defaultTemplate;

  updatePreview();

  statusText.textContent =
    "Template restored";
});

copyBtn.addEventListener("click", async () => {

  try{

    await navigator.clipboard.writeText(
      editor.value
    );

    statusText.textContent =
      "Copied to clipboard";

  }catch(err){

    statusText.textContent =
      "Clipboard blocked";
  }
});

/* =========================
   TAB SUPPORT
========================= */
editor.addEventListener("keydown", (e) => {

  if(e.key === "Tab"){

    e.preventDefault();

    const start = editor.selectionStart;
    const end = editor.selectionEnd;

    editor.value =
      editor.value.substring(0, start)
      + "  "
      + editor.value.substring(end);

    editor.selectionStart =
    editor.selectionEnd =
      start + 2;
  }
});

/* =========================
   LIVE UPDATE
========================= */
editor.addEventListener(
  "input",
  updatePreview
);

/* =========================
   INITIAL LOAD
========================= */
updatePreview();

/* =========================
   FORCE RENDER FIX
   (Fourthwall/iFrame bug)
========================= */
setTimeout(() => {

  editor.style.display = "none";

  requestAnimationFrame(() => {

    editor.style.display = "block";

  });

}, 50);
</script>

</body>
</html>
