<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* #DESIGN SYSTEM CONFIGURATION */
    :root {
      --bg-primary: #191919;
      --bg-secondary: #1F1F1F;
      --color-hover: #323232;
      --color-outline: #323232;
      --color-accent: #87A9FF;
      --text-primary: #D4D4D4;
      --text-secondary: #8C8C8C;
      --radius: 8px;
    }

    body {
      margin: 0;
      background: var(--bg-primary);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-primary);
      padding: 24px 16px;
    }

    /* #LAYOUT WRAPPERS */
    .tool-layout {
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1400px; /* Widened for the 5x5 grid */
      margin: 0 auto;
    }

    .panel-card {
      background: var(--bg-secondary);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius);
      padding: 24px 16px;
      box-sizing: border-box;
    }

    /* INPUT GRID */
    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    /* #TYPOGRAPHY */
    .header-bold {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 0;
      margin-bottom: 16px;
    }

    .title-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    /* #FORM CONTROLS */
    .input-group {
      display: flex;
      flex-direction: column;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-input {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text-primary);
      font-size: 12px;
      box-sizing: border-box;
      transition: border-color 0.2s ease;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .file-input-wrapper {
      display: flex;
      gap: 8px;
    }

    /* #BUTTONS */
    .btn {
      position: relative;
      padding: 10px 16px;
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      overflow: hidden;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:hover { background: var(--color-hover); }

    /* #YOUTUBE HOMEPAGE MOCKUP GRID */
    .yt-mock-container {
      background: #0F0F0F;
      border-radius: var(--radius);
      padding: 24px;
      overflow-x: auto; /* Allows scrolling if screen is too narrow for 5 columns */
    }

    .yt-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px 16px;
      min-width: 1200px; /* Forces grid to maintain readable proportions */
    }

    .yt-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    /* Custom Highlight for Center Card */
    .yt-card.custom-card {
      position: relative;
    }
    
    .yt-card.custom-card::before {
      content: 'YOUR CUSTOM VIDEO';
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--color-accent);
      font-weight: bold;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .yt-card.custom-card::after {
      content: '';
      position: absolute;
      top: -8px; left: -8px; right: -8px; bottom: -8px;
      border: 2px dashed rgba(135, 169, 255, 0.4);
      border-radius: 16px;
      pointer-events: none;
    }

    .yt-thumbnail-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #212121;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .yt-thumbnail {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.2s;
    }

    .yt-card:hover .yt-thumbnail {
      transform: scale(1.02);
    }

    .yt-duration {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #FFFFFF;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .yt-details {
      display: flex;
      gap: 12px;
      padding-right: 24px;
    }

    .yt-avatar-wrapper {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #313131;
      overflow: hidden;
      flex-shrink: 0;
    }

    .yt-avatar {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .yt-info {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .yt-title {
      font-size: 16px;
      font-weight: 600;
      color: #F1F1F1;
      line-height: 22px;
      margin: 0 0 4px 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .yt-metadata {
      font-size: 14px;
      color: #AAAAAA;
      line-height: 20px;
    }

    .yt-channel {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .yt-channel:hover { color: #FFFFFF; }

    .yt-verified-icon {
      fill: #AAAAAA;
      width: 14px; height: 14px;
    }

    /* #SYSTEM LOGS */
    .system-logs-panel { margin-top: 24px; }
    .logs-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .logs-content { height: 0; overflow: hidden; padding: 0; transition: all 0.2s ease-in-out; }
    .logs-content.active { height: auto; padding: 12px 0; margin-top: 12px; }
    .log-line { font-family: monospace; font-size: 12px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; justify-content: space-between; }
    .log-success { color: #A3E635; }
    .log-info { color: var(--color-accent); }
  </style>
</head>
<body>

  <div class="tool-layout">
    
    <div class="panel-card" id="INPUT_AREA">
      <h2 class="header-bold">2026 YouTube Studio Interface</h2>
      <div class="input-grid">
        
        <div class="input-group">
          <label class="label">Video Title</label>
          <input type="text" id="inp-title" class="field-input" value="How To Master Content Creation in 2026 (Step-by-Step Guide)">
        </div>
        
        <div class="input-group">
          <label class="label">Channel Name</label>
          <input type="text" id="inp-channel" class="field-input" value="HeroVibes">
        </div>

        <div class="input-group">
          <label class="label">Video Thumbnail</label>
          <div class="file-input-wrapper">
            <input type="text" id="inp-thumb-url" class="field-input" placeholder="Paste image URL...">
            <button type="button" class="btn" onclick="document.getElementById('file-thumb').click()">Upload</button>
            <input type="file" id="file-thumb" accept="image/*" style="display:none">
          </div>
        </div>

        <div class="input-group">
          <label class="label">Channel Avatar</label>
          <div class="file-input-wrapper">
            <input type="text" id="inp-avatar-url" class="field-input" placeholder="Paste avatar URL...">
            <button type="button" class="btn" onclick="document.getElementById('file-avatar').click()">Upload</button>
            <input type="file" id="file-avatar" accept="image/*" style="display:none">
          </div>
        </div>

        <div class="input-group">
          <label class="label">Video Duration</label>
          <input type="text" id="inp-duration" class="field-input" value="14:25">
        </div>

        <div class="input-group">
          <label class="label">Video Metrics & Time</label>
          <input type="text" id="inp-metrics" class="field-input" value="12K views • 2 hours ago">
        </div>

      </div>
    </div>

    <div class="panel-card" id="PREVIEW_DISPLAY" style="padding: 0; border: none; background: transparent;">
      <div class="yt-mock-container">
        <div class="yt-grid" id="yt-grid-target">
          </div>
      </div>
    </div>

    <div class="panel-card system-logs-panel">
      <div class="logs-header" onclick="toggleLogsPanel()">
        <div class="title-text" style="margin: 0;">System Diagnostic Console</div>
        <button class="btn" style="padding: 4px 10px; font-size: 12px;">Toggle Logs</button>
      </div>
      <div class="logs-content" id="diagnostic-logs">
        <div class="log-line"><span class="log-info">[SYSTEM] 5x5 Grid Rendered</span><span class="text-secondary">OK</span></div>
      </div>
    </div>

  </div>

  <script>
    // --- 1. DUMMY DATA FOR 2026 CONTEXT ---
    const fakeTitles = [
      "Exploring the Martian Surface in VR 🔴", "I asked an AI to build a house...",
      "Top 10 Hoverboard Tricks 2026", "Quantum Computing for Beginners",
      "Neuralink Update: What's New?", "Tour of the New Moon Base 🌙",
      "Synthesizing Food at Home", "Holographic Gaming is HERE",
      "My Brain-Computer Interface Setup", "Cyberpunk 2077 in Real Life?",
      "AI vs Pro Gamer - Starcraft 3", "Deep Sea City Tour (Aquatica)",
      "Flying Taxi Commute VLOG", "How to code in Web 4.0",
      "Teleportation: Fact or Fiction?", "The First AI President?",
      "Bio-hacking your sleep cycle", "Reviewing the Apple Glass Pro Max",
      "Living off-grid on Mars", "Asteroid Mining Explained",
      "Robot Olympics 2026 Highlights", "Uploading consciousness - The Science",
      "Virtual Real Estate Investing", "The End of Smartphones?"
    ];
    const fakeChannels = ["TechVision", "FutureNow", "MarsVlog", "AI_Daily", "QuantumGeek", "SpaceX_Fan", "CyberLife", "HoloGaming", "BioHacker", "RoboTech"];
    const fakeViews = ["1.2M", "45K", "890K", "2.1M", "10K", "340K", "5.5M", "120K", "99K", "670K"];
    const fakeTimes = ["2 hours ago", "1 day ago", "3 weeks ago", "4 hours ago", "10 mins ago", "5 days ago", "1 month ago"];
    
    // Pick deterministic random based on index to keep grid stable on re-renders if needed
    const getFake = (arr, index) => arr[index % arr.length];

    // --- 2. RENDER THE 5x5 GRID ---
    const gridTarget = document.getElementById('yt-grid-target');
    let gridHTML = '';

    for (let i = 0; i < 25; i++) {
      if (i === 12) {
        // The 13th Card (Center of 5x5) is our Customizable Target
        gridHTML += `
          <div class="yt-card custom-card">
            <div class="yt-thumbnail-wrapper">
              <img id="yt-thumb-img" class="yt-thumbnail" src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=600" alt="Thumbnail">
              <div id="yt-duration-badge" class="yt-duration">14:25</div>
            </div>
            <div class="yt-details">
              <div class="yt-avatar-wrapper">
                <img id="yt-avatar-img" class="yt-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" alt="Avatar">
              </div>
              <div class="yt-info">
                <h3 id="yt-title-text" class="yt-title">How To Master Content Creation in 2026 (Step-by-Step Guide)</h3>
                <div class="yt-metadata">
                  <div class="yt-channel">
                    <span id="yt-channel-name">HeroVibes</span>
                    <svg class="yt-verified-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                  </div>
                  <div id="yt-metrics-text">12K views • 2 hours ago</div>
                </div>
              </div>
            </div>
          </div>
        `;
      } else {
        // Static Placeholder Cards
        const title = getFake(fakeTitles, i * 7);
        const channel = getFake(fakeChannels, i * 3);
        const views = getFake(fakeViews, i * 5);
        const time = getFake(fakeTimes, i * 2);
        const minutes = (i % 20) + 2;
        const seconds = (i % 50) + 10;
        
        // Using Picsum with a seed to get consistent placeholder images
        const thumbUrl = `https://picsum.photos/seed/${i + 100}/600/337`;
        const avatarUrl = `https://picsum.photos/seed/avatar${i}/150/150`;

        gridHTML += `
          <div class="yt-card">
            <div class="yt-thumbnail-wrapper">
              <img class="yt-thumbnail" src="${thumbUrl}" alt="Thumbnail">
              <div class="yt-duration">${minutes}:${seconds}</div>
            </div>
            <div class="yt-details">
              <div class="yt-avatar-wrapper">
                <img class="yt-avatar" src="${avatarUrl}" alt="Avatar">
              </div>
              <div class="yt-info">
                <h3 class="yt-title">${title}</h3>
                <div class="yt-metadata">
                  <div class="yt-channel">
                    <span>${channel}</span>
                    ${i % 3 === 0 ? '<svg class="yt-verified-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM10 17l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                  </div>
                  <div>${views} views • ${time}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }
    }
    
    // Inject HTML
    gridTarget.innerHTML = gridHTML;

    // --- 3. BIND CUSTOM CONTROLS TO CENTER CARD ---
    
    // Inputs
    const inpTitle = document.getElementById('inp-title');
    const inpChannel = document.getElementById('inp-channel');
    const inpThumbUrl = document.getElementById('inp-thumb-url');
    const fileThumb = document.getElementById('file-thumb');
    const inpAvatarUrl = document.getElementById('inp-avatar-url');
    const fileAvatar = document.getElementById('file-avatar');
    const inpDuration = document.getElementById('inp-duration');
    const inpMetrics = document.getElementById('inp-metrics');

    // Targets (now existing in the DOM after grid generation)
    const ytTitle = document.getElementById('yt-title-text');
    const ytChannel = document.getElementById('yt-channel-name');
    const ytThumb = document.getElementById('yt-thumb-img');
    const ytAvatar = document.getElementById('yt-avatar-img');
    const ytDuration = document.getElementById('yt-duration-badge');
    const ytMetrics = document.getElementById('yt-metrics-text');

    // Logging helper
    function appendDiagnosticLog(message, type = 'info') {
      const logsBox = document.getElementById('diagnostic-logs');
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="log-${type}">${message}</span><span>${new Date().toLocaleTimeString()}</span>`;
      logsBox.appendChild(line);
      scheduleHeightCheck();
    }

    // Dynamic Engine Sync Controls
    inpTitle.addEventListener('input', () => {
      ytTitle.textContent = inpTitle.value || 'Untitled Video';
      scheduleHeightCheck();
    });

    inpChannel.addEventListener('input', () => {
      ytChannel.textContent = inpChannel.value || 'Channel Name';
    });

    inpDuration.addEventListener('input', () => {
      ytDuration.textContent = inpDuration.value || '0:00';
    });

    inpMetrics.addEventListener('input', () => {
      ytMetrics.textContent = inpMetrics.value || '0 views • 0 minutes ago';
    });

    // Asset Management: Thumbnails
    inpThumbUrl.addEventListener('input', () => {
      if(inpThumbUrl.value.trim() !== "") {
        ytThumb.src = inpThumbUrl.value;
        appendDiagnosticLog('[ASSET] Custom thumbnail updated via URL', 'success');
      }
    });

    fileThumb.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const localUrl = URL.createObjectURL(file);
        ytThumb.src = localUrl;
        inpThumbUrl.value = file.name;
        appendDiagnosticLog(`[FILE] Local thumbnail uploaded: ${file.name}`, 'success');
      }
    });

    // Asset Management: Avatars
    inpAvatarUrl.addEventListener('input', () => {
      if(inpAvatarUrl.value.trim() !== "") {
        ytAvatar.src = inpAvatarUrl.value;
        appendDiagnosticLog('[ASSET] Custom avatar updated via URL', 'success');
      }
    });

    fileAvatar.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const localUrl = URL.createObjectURL(file);
        ytAvatar.src = localUrl;
        inpAvatarUrl.value = file.name;
        appendDiagnosticLog(`[FILE] Local profile avatar uploaded: ${file.name}`, 'success');
      }
    });

    // Layout Section Toggling
    function toggleLogsPanel() {
      const logs = document.getElementById('diagnostic-logs');
      logs.classList.toggle('active');
      scheduleHeightCheck();
    }

    // Scroll slightly to center the grid container on load for narrow screens
    window.addEventListener('load', () => {
       const mockContainer = document.querySelector('.yt-mock-container');
       if (mockContainer.scrollWidth > mockContainer.clientWidth) {
           mockContainer.scrollLeft = (mockContainer.scrollWidth - mockContainer.clientWidth) / 2;
       }
    });

  </script>

  <script>
    // ===== FOURTHWALL SCROLLBAR FIX =====
    let lastHeight = 0;
    let resizeTimer;

    function sendHeight() {
      const height = document.body.scrollHeight;
      if (height !== lastHeight) {
        lastHeight = height;
        window.parent.postMessage({ frameHeight: height }, '*');
      }
    }

    function scheduleHeightCheck() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(sendHeight, 150);
    }

    window.addEventListener('load', () => setTimeout(sendHeight, 100));
    window.addEventListener('resize', () => scheduleHeightCheck());
    // ===== END OF SCROLLBAR FIX =====
  </script>
</body>
</html>
