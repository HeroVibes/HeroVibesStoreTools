<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root {
  --bg-primary: #191919;
  --bg-secondary: #1F1F1F;
  --color-hover: #323232;
  --color-outline: #323232;
  --color-accent: #87A9FF;
  --text-primary: #D4D4D4;
  --text-secondary: #8C8C8C;
  --yt-bg: #0F0F0F;
  --yt-text-primary: #F1F1F1;
  --yt-text-secondary: #AAAAAA;
  --yt-vignette: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
  --radius: 8px;
}

body {
  margin: 0;
  background: var(--bg-primary);
  font-family: system-ui, sans-serif;
  color: var(--text-primary);
  padding: 20px 12px;
}

/* LAYOUT */
.tool-layout {
  max-width: 1200px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* PANEL */
.panel-card {
  background: var(--bg-secondary);
  border: 1px solid var(--color-outline);
  border-radius: var(--radius);
  padding: 18px 14px;
  position: relative;
}

/* COLLAPSE */
.collapsible-settings {
  max-height: 2000px;
  overflow: hidden;
  transition: all .35s ease;
}

.collapsible-settings.hidden {
  max-height: 0;
  padding: 0;
  opacity: 0;
  border: none;
}

/* TOP CONTROLS MOVED INSIDE PANEL */
.top-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
}

/* BUTTONS */
.btn {
  padding: 9px 12px;
  border-radius: var(--radius);
  background: var(--bg-primary);
  border: 1px solid var(--color-outline);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 13px;
}

.btn:hover { background: var(--color-hover); }
.btn.active { background: var(--color-accent); color: #000; }

/* CLOSE BUTTON */
.close-settings {
  position: absolute;
  top: 10px;
  right: 10px;
  background: transparent;
  border: 1px solid var(--color-outline);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-secondary);
}

/* INPUT GRID */
.input-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  display: block;
}

.field-input {
  width: 100%;
  padding: 9px;
  border-radius: var(--radius);
  border: 1px solid var(--color-outline);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 12px;
}

/* PREVIEW */
.yt-mock-container {
  background: var(--yt-bg);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
}

/* VIGNETTE FIXED */
.vignette-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: var(--yt-vignette);
  z-index: 5;
  border-radius: var(--radius);
  transition: opacity .3s ease;
}

.vignette-overlay.hidden {
  opacity: 0;
}

/* GRID RESPONSIVE FIX */
.yt-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

/* CARD */
.yt-card {
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

/* THUMB */
.yt-thumbnail-wrapper {
  position: relative;
  padding-top: 56.25%;
  border-radius: 10px;
  overflow: hidden;
  background: #222;
}

.yt-thumbnail {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* DETAILS */
.yt-title {
  font-size: 13px;
  margin: 6px 0 4px;
}

.yt-meta {
  font-size: 11px;
  color: var(--text-secondary);
}

/* MOBILE FIXES */
@media (max-width: 768px) {
  body { padding: 12px; }

  .yt-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .panel-card {
    padding: 14px 10px;
  }
}
</style>
</head>

<body>

<div class="tool-layout">

  <!-- SETTINGS -->
  <div class="panel-card">

    <button class="close-settings" id="close-settings">×</button>

    <div class="top-controls">
      <button class="btn" id="theme">Theme</button>
      <button class="btn" id="toggle-vignette">Vignette</button>
      <button class="btn" id="toggle-settings">Settings</button>
    </div>

    <div class="collapsible-settings" id="settings">

      <div class="input-grid">

        <div>
          <label class="label">Title</label>
          <input class="field-input" id="title" value="How To Master Content Creation">
        </div>

        <div>
          <label class="label">Channel</label>
          <input class="field-input" id="channel" value="HeroVibes">
        </div>

        <div>
          <label class="label">Views</label>
          <input class="field-input" id="views" value="12K">
        </div>

        <div>
          <label class="label">Time</label>
          <input class="field-input" id="time" value="2 hours ago">
        </div>

      </div>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="yt-mock-container">

    <div class="vignette-overlay" id="vignette"></div>

    <div class="yt-grid" id="grid"></div>

  </div>

</div>

<script>

// SETTINGS TOGGLE
const settings = document.getElementById('settings');
document.getElementById('toggle-settings').onclick = () => {
  settings.classList.toggle('hidden');
};

// CLOSE BUTTON
document.getElementById('close-settings').onclick = () => {
  settings.classList.add('hidden');
};

// VIGNETTE TOGGLE
const vignette = document.getElementById('vignette');
document.getElementById('toggle-vignette').onclick = () => {
  vignette.classList.toggle('hidden');
};

// THEME TOGGLE
document.getElementById('theme').onclick = () => {
  document.documentElement.dataset.theme =
    document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
};

// GRID GENERATION
const grid = document.getElementById('grid');

for (let i = 0; i < 18; i++) {
  grid.innerHTML += `
    <div class="yt-card">
      <div class="yt-thumbnail-wrapper">
        <img src="https://picsum.photos/300/170?${i}" class="yt-thumbnail">
      </div>
      <div class="yt-title">Sample Video Title ${i+1}</div>
      <div class="yt-meta">12K views • 2 hours ago</div>
    </div>
  `;
}

</script>

</body>
</html>
