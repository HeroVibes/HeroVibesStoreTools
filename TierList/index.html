<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tier List Maker</title>
  <style>
    :root {
      --bg: #191919;
      --card-bg: #1F1F1F;
      --hover: #323232;
      --outline: #323232;
      --accent: #87A9FF;
      --text-primary: #D4D4D4;
      --text-secondary: #8C8C8C;
      --radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      /* Reduced body padding */
      padding: 12px 8px;
      background: var(--bg);
      font-family: system-ui, sans-serif;
      color: var(--text-primary);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      max-width: 1000px; /* Tightened max-width */
      margin: 0 auto;
    }

    /* ===== CONTROLS SECTION ===== */
    .controls {
      background: var(--card-bg);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      /* Reduced padding and margins */
      padding: 12px 16px;
      margin-bottom: 12px;
    }

    .control-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .control-group label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    select, input[type="file"] {
      background: var(--bg);
      color: var(--text-primary);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      padding: 8px 12px; /* Slimmer inputs */
      font-size: 14px;
      cursor: pointer;
      flex: 1;
      min-width: 200px;
    }

    select:hover, input[type="file"]:hover {
      background: var(--hover);
    }

    input[type="file"] {
      cursor: pointer;
    }

    /* ===== BUTTONS ===== */
    .btn {
      position: relative;
      padding: 8px 16px; /* Slimmer buttons */
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      overflow: hidden;
      font-size: 14px;
      white-space: nowrap;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 75%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-25deg);
      transition: left .7s ease-in-out;
    }

    .btn:hover::before {
      left: 125%;
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(135,169,255,0.12);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== TIER LIST CONTAINER ===== */
    #tierListContainer {
      background: var(--card-bg);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      padding: 12px; /* Reduced padding */
      margin-bottom: 12px;
    }

    /* ===== TIER ROW ===== */
    .tier-row {
      display: flex;
      margin-bottom: 4px; /* Tighter rows */
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg);
    }
    
    /* Remove bottom margin from last row */
    .tier-row:last-child {
      margin-bottom: 0;
    }

    .tier-label {
      background: var(--card-bg);
      color: var(--text-primary);
      font-weight: bold;
      font-size: 16px; /* Smaller font */
      width: 50px; /* Slimmer label box */
      min-width: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--outline);
    }

    .tier-label.s { background: #FF7F7F; color: #000; }
    .tier-label.a { background: #FFBF7F; color: #000; }
    .tier-label.b { background: #FFDF7F; color: #000; }
    .tier-label.c { background: #FFFF7F; color: #000; }
    .tier-label.d { background: #BFFF7F; color: #000; }
    .tier-label.e { background: #7FBFFF; color: #000; }
    .tier-label.f { background: #BF7FFF; color: #000; }

    .tier-items {
      display: flex;
      flex-wrap: wrap;
      flex: 1;
      padding: 2px; /* Tighter padding */
      gap: 2px; /* Tighter gap */
      min-height: 82px; /* Adjusted to fit the smaller 2:3 height */
      align-content: flex-start;
    }

    .tier-items.drag-over {
      background: var(--hover);
    }

    /* ===== TIER ITEM (COMPACT 2:3 RATIO) ===== */
    .tier-item {
      width: 52px; /* Scaled down width */
      height: 78px; /* Scaled down height (2:3 Aspect Ratio) */
      border-radius: 4px;
      overflow: hidden;
      cursor: grab;
      border: 1px solid var(--outline); /* Thinner border */
      background: var(--card-bg);
      flex-shrink: 0;
    }

    .tier-item:active {
      cursor: grabbing;
    }

    .tier-item.dragging {
      opacity: 0.5;
    }

    .tier-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== UNRANKED SECTION ===== */
    .unranked-section {
      background: var(--card-bg);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }

    .unranked-header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px; /* Tighter margin */
      color: var(--text-secondary);
    }

    .unranked-items {
      display: flex;
      flex-wrap: wrap;
      gap: 2px; /* Tighter gap */
      min-height: 82px; /* Matches row min-height */
      padding: 2px;
      background: var(--bg);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
    }

    .unranked-items.drag-over {
      background: var(--hover);
    }

    /* ===== ACTION BUTTONS ===== */
    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ===== MOBILE RESPONSIVENESS ===== */
    @media (max-width: 768px) {
      .control-group {
        flex-direction: column;
        align-items: stretch;
      }

      select, input[type="file"], .btn {
        width: 100%;
        min-width: unset;
      }

      .tier-label {
        width: 40px;
        min-width: 40px;
        font-size: 14px;
      }

      .tier-item {
        width: 44px; /* Even smaller for mobile */
        height: 66px; /* 2:3 Aspect Ratio */
      }
      
      .tier-items, .unranked-items {
        min-height: 70px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="controls">
      <div class="control-group">
        <label for="presetSelect">Template:</label>
        <select id="presetSelect">
          <option value="">Custom (Upload Your Own)</option>
          </select>
        
        <label for="imageUpload">Upload Images:</label>
        <input type="file" id="imageUpload" accept="image/*" multiple />
      </div>
    </div>

    <div id="tierListContainer">
      <div class="tier-row" data-tier="s">
        <div class="tier-label s">S</div>
        <div class="tier-items" data-tier="s"></div>
      </div>
      <div class="tier-row" data-tier="a">
        <div class="tier-label a">A</div>
        <div class="tier-items" data-tier="a"></div>
      </div>
      <div class="tier-row" data-tier="b">
        <div class="tier-label b">B</div>
        <div class="tier-items" data-tier="b"></div>
      </div>
      <div class="tier-row" data-tier="c">
        <div class="tier-label c">C</div>
        <div class="tier-items" data-tier="c"></div>
      </div>
      <div class="tier-row" data-tier="d">
        <div class="tier-label d">D</div>
        <div class="tier-items" data-tier="d"></div>
      </div>
      <div class="tier-row" data-tier="e">
        <div class="tier-label e">E</div>
        <div class="tier-items" data-tier="e"></div>
      </div>
      <div class="tier-row" data-tier="f">
        <div class="tier-label f">F</div>
        <div class="tier-items" data-tier="f"></div>
      </div>
    </div>

    <div class="unranked-section">
      <div class="unranked-header">Unranked Items</div>
      <div class="unranked-items" id="unrankedItems"></div>
    </div>

    <div class="action-buttons">
      <button class="btn" id="downloadBtn">Download Tier List</button>
      <button class="btn" id="clearBtn">Clear All</button>
      <button class="btn" id="resetBtn">Reset to Unranked</button>
    </div>

  </div>

  <script>
    // ===== STATE MANAGEMENT =====
    let draggedItem = null;
    let itemIdCounter = 0;

    // ===== DOM ELEMENTS =====
    const presetSelect = document.getElementById('presetSelect');
    const imageUpload = document.getElementById('imageUpload');
    const unrankedItems = document.getElementById('unrankedItems');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ===== GITHUB API LOGIC =====
    const GITHUB_REPO_API = "https://api.github.com/repos/HeroVibes/HeroVibesStoreTools/contents/TierList/Presets";
    const GITHUB_PAGES_BASE = "https://herovibes.github.io/HeroVibesStoreTools/TierList/Presets";

    // Fetch available folders to populate the dropdown dynamically
    async function fetchFolders() {
      try {
        const response = await fetch(GITHUB_REPO_API);
        if (!response.ok) throw new Error('Failed to fetch from GitHub');
        const data = await response.json();
        
        // Filter for directories
        const folders = data.filter(item => item.type === "dir");
        
        folders.forEach(folder => {
          const option = document.createElement("option");
          option.value = folder.name;
          // Format folder name (e.g., "Mcu_Movies" to "Mcu Movies")
          option.textContent = folder.name.replace(/_/g, ' '); 
          presetSelect.appendChild(option);
        });
      } catch (error) {
        console.error("Error loading templates from GitHub:", error);
      }
    }

    // Fetch webp/images from the selected folder
    async function loadTemplateImages(folderName) {
      if (!folderName) return; 

      try {
        const response = await fetch(`${GITHUB_REPO_API}/${folderName}`);
        if (!response.ok) throw new Error('Failed to fetch folder contents');
        const data = await response.json();
        
        clearAllItems();
        
        data.forEach(file => {
          if (file.type === "file" && file.name.match(/\.(webp|png|jpg|jpeg|gif)$/i)) {
             const imageUrl = `${GITHUB_PAGES_BASE}/${folderName}/${file.name}`;
             createTierItem(imageUrl);
          }
        });
      } catch (error) {
        console.error("Error loading images:", error);
        alert("There was an issue loading this template. Please try again later.");
      }
    }

    // ===== PRESET SELECTION =====
    presetSelect.addEventListener('change', function() {
      const folderName = this.value;
      if (folderName === "") {
        clearAllItems();
      } else {
        loadTemplateImages(folderName);
      }
    });

    // ===== IMAGE UPLOAD =====
    imageUpload.addEventListener('change', function(e) {
      const files = e.target.files;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(event) {
          createTierItem(event.target.result);
        };
        reader.readAsDataURL(file);
      });
      presetSelect.value = "";
      this.value = '';
    });

    // ===== CREATE TIER ITEM =====
    function createTierItem(imageSrc) {
      const item = document.createElement('div');
      item.className = 'tier-item';
      item.draggable = true;
      item.dataset.id = itemIdCounter++;
      
      const img = document.createElement('img');
      // CRITICAL: Prevent CORS errors when generating the final canvas image
      img.crossOrigin = "anonymous"; 
      img.src = imageSrc;
      img.alt = 'Tier item';
      
      item.appendChild(img);
      unrankedItems.appendChild(item);
      
      setupDragEvents(item);
      scheduleHeightCheck();
    }

    // ===== DRAG AND DROP SETUP =====
    function setupDragEvents(item) {
      item.addEventListener('dragstart', function(e) {
        draggedItem = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      item.addEventListener('dragend', function() {
        this.classList.remove('dragging');
        draggedItem = null;
      });
    }

    // ===== DROP ZONES =====
    const dropZones = document.querySelectorAll('.tier-items, .unranked-items');
    dropZones.forEach(zone => {
      zone.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
      });

      zone.addEventListener('dragleave', function() {
        this.classList.remove('drag-over');
      });

      zone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        
        if (draggedItem) {
          this.appendChild(draggedItem);
          scheduleHeightCheck();
        }
      });
    });

    // ===== CLEAR ALL ITEMS =====
    clearBtn.addEventListener('click', function() {
      if (confirm('Are you sure you want to clear all items?')) {
        clearAllItems();
        presetSelect.value = "";
      }
    });

    function clearAllItems() {
      document.querySelectorAll('.tier-item').forEach(item => item.remove());
      scheduleHeightCheck();
    }

    // ===== RESET TO UNRANKED =====
    resetBtn.addEventListener('click', function() {
      const allItems = document.querySelectorAll('.tier-items .tier-item');
      allItems.forEach(item => {
        unrankedItems.appendChild(item);
      });
      scheduleHeightCheck();
    });

    // ===== DOWNLOAD TIER LIST =====
    downloadBtn.addEventListener('click', async function() {
      // Prevent rapid clicking
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Generating...';
      
      const tierListContainer = document.getElementById('tierListContainer');
      
      try {
        // Dynamically load html2canvas if not present
        if (typeof html2canvas === 'undefined') {
          await new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
        }
        
        // Ensure image loading is complete before capturing
        const canvas = await html2canvas(tierListContainer, {
          backgroundColor: '#1F1F1F', // Matches CARD/INNER CONTAINER BACKGROUND 
          scale: 2,
          logging: false,
          useCORS: true // Essential for rendering GitHub pages images
        });
        
        const link = document.createElement('a');
        link.download = 'tier-list.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
      } catch (error) {
        console.error("Screenshot Error:", error);
        alert('There was an error generating your image. Ensure you are connected to the internet.');
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = 'Download Tier List';
      }
    });

    // ===== INITIALIZATION =====
    window.addEventListener('load', function() {
      fetchFolders();
    });

    // ===== FOURTHWALL SCROLLBAR FIX =====
    let lastHeight = 0;
    let resizeTimer;

    /**
     * Sends the current scrollHeight to the parent window if it has changed.
     * This is the *only* function that should send a postMessage.
     */
    function sendHeight() {
      const height = document.body.scrollHeight;
      
      if (height !== lastHeight) {
        lastHeight = height;
        window.parent.postMessage({ frameHeight: height }, '*');
      }
    }

    /**
     * A debounced version of sendHeight() to be called on content changes.
     * This ensures we don't spam messages during rapid changes. 
     */
    function scheduleHeightCheck() {
      clearTimeout(resizeTimer); 
      resizeTimer = setTimeout(sendHeight, 150);
    }

    // Send height on initial load (with a slight delay) 
    // This fixes the "Content Cut-Off" race condition.
    window.addEventListener('load', () => {
      setTimeout(sendHeight, 100);
    });

    // Send height on window resize (debounced) 
    window.addEventListener('resize', () => {
      scheduleHeightCheck();
    });
    // ===== END OF SCROLLBAR FIX =====
  </script>

</body>
</html>
